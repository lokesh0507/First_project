name: Auto Update Dependency Graph

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  update-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Dependency Graph Script
        run: |
          python tools/deps-scanner/scan.py

      - name: Commit Updated Graph
        run: |
          git config --global user.name "Graph-Bot"
          git config --global user.email "graph-bot@example.com"

          git add output/deps.mmd || true

          git diff --cached --quiet || git commit -m "Auto-update dependency graph"

      - name: Push Changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main